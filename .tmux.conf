#settings for nvim
set-option -g focus-events on
set-option -sa terminal-features ',xterm-kitty:RGB'
#set-option -g default-terminal "screen-256color"
set -g escape-time 0

# custom prefix
unbind C-b
set -g prefix M-a
set -g prefix2 C-q
bind C-q send-prefix -2

# mouse on
set -g mouse on

# pane navigation
bind h select-pane -L  # move left
bind j select-pane -D  # move down
bind k select-pane -U  # move up
bind -n MouseDown1StatusRight resize-pane -Z  # move up
bind l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind BTab switch-client -l  # move to last session
bind r source-file ~/.tmux.conf \; display sourced

bind-key    -T prefix       Enter                  next-layout
bind-key    -T prefix       Space  display-popup -E python3

# window manip

bind c new-window -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"
bind % split-window -c "#{pane_current_path}" -h
bind '"' split-window -c "#{pane_current_path}" -v

# vi keys
set -g status-keys vi
set -g mode-keys vi

# copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDown1Pane send -X clear-selection
bind -T copy-mode-vi DoubleClick1Pane send -X select-word
bind -T copy-mode-vi TripleClick1Pane send -X select-line
bind -T copy-mode-vi Escape send -X clear-selection
bind -T copy-mode-vi Space send -X page-down


# status bar
set -g status-left "#{?#(~/scripts/sessions.sh),#{session_name}],}"
set -g status-right " #{?client_prefix,•,}#(~/scripts/git-changes.sh #{pane_current_path})%H%M%u%d"
set -g status-bg white

# clear screen
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

